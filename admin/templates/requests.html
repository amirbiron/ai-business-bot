{% extends "base.html" %}

{% block content %}
<div class="page-header animate-fade-in">
    <h1><i class="bi bi-bell"></i> בקשות נציג</h1>
</div>

<div class="card animate-slide-up">
    <div class="card-body" style="padding: 0;">
        {% if requests %}
        <div class="table-wrapper">
            <table id="requests-table">
                <thead>
                    <tr>
                        <th class="sortable" data-col="0">מזהה <i class="bi bi-chevron-expand sort-icon"></i></th>
                        <th class="sortable" data-col="1">לקוח <i class="bi bi-chevron-expand sort-icon"></i></th>
                        <th>הודעה</th>
                        <th class="sortable" data-col="3">סטטוס <i class="bi bi-chevron-expand sort-icon"></i></th>
                        <th class="sortable" data-col="4">נוצר <i class="bi bi-chevron-expand sort-icon"></i></th>
                        <th>פעולות</th>
                    </tr>
                </thead>
                <tbody id="requests-table-body">
                    {% for req in requests %}
                    {% include "partials/request_row.html" %}
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% else %}
        <div class="empty-state">
            <i class="bi bi-check-circle"></i>
            <p>אין עדיין בקשות נציג.</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var table = document.getElementById('requests-table');
    if (!table) return;
    var tbody = table.querySelector('tbody');
    var headers = table.querySelectorAll('th.sortable');
    var currentCol = -1;
    var ascending = true;

    headers.forEach(function(th) {
        th.addEventListener('click', function() {
            var col = parseInt(th.dataset.col);
            if (currentCol === col) {
                ascending = !ascending;
            } else {
                currentCol = col;
                ascending = true;
            }

            // עדכון אייקונים
            headers.forEach(function(h) {
                h.querySelector('.sort-icon').className = 'bi bi-chevron-expand sort-icon';
                h.classList.remove('sort-active');
            });
            th.querySelector('.sort-icon').className = ascending
                ? 'bi bi-chevron-up sort-icon' : 'bi bi-chevron-down sort-icon';
            th.classList.add('sort-active');

            // מיון שורות
            var rows = Array.from(tbody.querySelectorAll('tr'));
            rows.sort(function(a, b) {
                var cellA = a.cells[col];
                var cellB = b.cells[col];
                var valA = (cellA.dataset.sortValue || cellA.textContent).trim();
                var valB = (cellB.dataset.sortValue || cellB.textContent).trim();

                // מספרים טהורים בלבד (עמודת מזהה)
                var numA = Number(valA);
                var numB = Number(valB);
                if (!isNaN(numA) && !isNaN(numB) && valA !== '' && valB !== '') {
                    return ascending ? numA - numB : numB - numA;
                }
                // טקסט
                var cmp = valA.localeCompare(valB, 'he');
                return ascending ? cmp : -cmp;
            });
            rows.forEach(function(row) { tbody.appendChild(row); });
        });
    });
})();
</script>
{% endblock %}
